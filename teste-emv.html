<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste EMV — Radar Relevantia</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #0d0d14;
    --bg-card: #16161f;
    --bg-card-hover: #1c1c28;
    --gold: #c9a84c;
    --gold-pale: #f5e6b8;
    --gold-bg: rgba(201,168,76,0.08);
    --green: #34d399;
    --amber: #fbbf24;
    --gray-300: #d1d5db;
    --gray-400: #9ca3af;
    --gray-500: #6b7280;
    --gray-600: #4b5563;
    --gray-700: #374151;
    --white: #f9fafb;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-dark);
    color: var(--white);
    padding: 32px 24px;
    line-height: 1.6;
  }

  .container { max-width: 1200px; margin: 0 auto; }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--gray-400);
    font-size: 14px;
    margin-bottom: 40px;
  }

  .scenarios {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 24px;
    margin-bottom: 48px;
  }

  .scenario-card {
    background: var(--bg-card);
    border: 1px solid var(--gray-700);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .scenario-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--gray-700);
  }

  .scenario-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--white);
    margin-bottom: 4px;
  }

  .scenario-header p {
    font-size: 12px;
    color: var(--gray-400);
  }

  .scenario-body { padding: 20px; }

  /* ── EMV Widget ─────────────────────────────────────── */
  .emv-widget {
    background: var(--gold-bg);
    border: 1px solid rgba(201,168,76,0.20);
    border-radius: var(--radius-sm);
    padding: 20px;
    margin-bottom: 16px;
  }

  .emv-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .emv-total {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--gold-pale);
    margin-bottom: 12px;
  }

  .emv-confidence {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 16px;
  }

  .emv-confidence .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    display: inline-block;
  }

  .confidence-alta {
    background: rgba(52,211,153,0.12);
    color: var(--green);
  }
  .confidence-alta .dot { background: var(--green); }

  .confidence-media {
    background: rgba(251,191,36,0.12);
    color: var(--amber);
  }
  .confidence-media .dot { background: var(--amber); }

  .confidence-estimativa {
    background: rgba(156,163,175,0.12);
    color: var(--gray-400);
  }
  .confidence-estimativa .dot { background: var(--gray-400); }

  .emv-breakdown { margin-top: 12px; }

  .emv-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 13px;
  }

  .emv-row:last-child { border-bottom: none; }

  .emv-row-label {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--gray-300);
  }

  .emv-row-icon {
    width: 20px;
    text-align: center;
    font-size: 14px;
  }

  .emv-row-value {
    font-weight: 600;
    color: var(--gold-pale);
  }

  .emv-disclaimer {
    font-size: 10px;
    font-style: italic;
    color: var(--gray-500);
    margin-top: 12px;
    line-height: 1.4;
  }

  .emv-empty {
    text-align: center;
    padding: 24px;
    color: var(--gray-500);
    font-size: 13px;
    font-style: italic;
  }

  /* ── Debug Panel ────────────────────────────────────── */
  .debug-toggle {
    display: inline-block;
    font-size: 11px;
    color: var(--gray-500);
    cursor: pointer;
    padding: 6px 0;
    user-select: none;
  }

  .debug-toggle:hover { color: var(--gray-400); }

  .debug-panel {
    display: none;
    background: #0a0a10;
    border: 1px solid var(--gray-700);
    border-radius: var(--radius-sm);
    padding: 12px;
    margin-top: 8px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: var(--gray-400);
    max-height: 300px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .debug-panel.open { display: block; }

  /* ── Custom Test Section ────────────────────────────── */
  .custom-section {
    background: var(--bg-card);
    border: 1px solid var(--gray-700);
    border-radius: var(--radius);
    padding: 24px;
    margin-top: 24px;
  }

  .custom-section h2 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--gold);
    margin-bottom: 16px;
  }

  .custom-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  @media (max-width: 768px) {
    .custom-grid { grid-template-columns: 1fr; }
  }

  .field-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--gray-400);
    margin-bottom: 6px;
  }

  .field-group input, .field-group select, .field-group textarea {
    width: 100%;
    padding: 10px 12px;
    background: var(--bg-dark);
    border: 1px solid var(--gray-600);
    border-radius: var(--radius-sm);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
  }

  .field-group textarea {
    min-height: 80px;
    resize: vertical;
  }

  .field-group input:focus, .field-group select:focus, .field-group textarea:focus {
    outline: none;
    border-color: var(--gold);
  }

  .btn-calc {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    background: linear-gradient(135deg, var(--gold), #b8943f);
    color: #0d0d14;
    font-weight: 700;
    font-size: 14px;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btn-calc:hover { opacity: 0.9; }

  #customResult { margin-top: 20px; }
</style>
</head>
<body>

<div class="container">
  <h1>Calculadora de EMV — Teste</h1>
  <p class="subtitle">Estimated Media Value (Valor Estimado de Midia) — Pagina de teste isolada, nao faz parte do MVP</p>

  <!-- ═══ CENÁRIOS PRE-DEFINIDOS ═══ -->
  <div class="scenarios" id="scenarios"></div>

  <!-- ═══ TESTE CUSTOM ═══ -->
  <div class="custom-section">
    <h2>Teste com dados custom</h2>

    <div class="custom-grid">
      <div class="field-group">
        <label>Categoria</label>
        <select id="customCat">
          <option value="Esporte">Esporte</option>
          <option value="Música">Musica</option>
          <option value="Moda">Moda</option>
          <option value="Tech">Tech</option>
          <option value="Gastronomia">Gastronomia</option>
          <option value="Cultura">Cultura</option>
          <option value="">Sem categoria</option>
        </select>
      </div>

      <div class="field-group">
        <label>Publico presencial (historico)</label>
        <input type="text" id="customPresencial" placeholder="Ex: 15.000 participantes em 2024" value="">
      </div>

      <div class="field-group">
        <label>Instagram seguidores</label>
        <input type="number" id="customInsta" placeholder="Ex: 150000" value="">
      </div>

      <div class="field-group">
        <label>Instagram formatos</label>
        <input type="text" id="customInstaFormats" placeholder="Ex: Reels, Stories, Posts" value="">
      </div>

      <div class="field-group">
        <label>TikTok seguidores</label>
        <input type="number" id="customTiktok" placeholder="Ex: 80000" value="">
      </div>

      <div class="field-group">
        <label>YouTube seguidores</label>
        <input type="number" id="customYoutube" placeholder="Ex: 50000" value="">
      </div>

      <div class="field-group">
        <label>Transmissao prevista</label>
        <input type="text" id="customBroadcast" placeholder="Ex: TV Aberta (Globo) e Streaming" value="">
      </div>

      <div class="field-group">
        <label>Publico esperado (fact)</label>
        <input type="text" id="customPublicoEsperado" placeholder="Ex: 50.000 pessoas" value="">
      </div>
    </div>

    <button class="btn-calc" onclick="runCustom()">Calcular EMV</button>

    <div id="customResult"></div>
  </div>
</div>

<script src="js/emv-calculator.js"></script>
<script>
(function () {
  'use strict';

  // ── DADOS MOCK — 3 cenários ─────────────────────────────────────

  var SCENARIOS = [
    {
      name: 'Oportunidade Completa',
      desc: 'Evento esportivo com canais digitais, publico presencial e transmissao TV — dados reais',
      data: {
        category: 'Esporte',
        publicoCanais: {
          'insta_01': {
            network: 'instagram',
            tipo_dado: 'real',
            seguidores: 250000,
            genero: { f: 40, m: 60 },
            faixa_etaria: { '1824': 25, '2534': 35, '3544': 25, '45p': 15 },
            formatos: ['Reels', 'Stories', 'Posts'],
            cidade: 'Sao Paulo'
          },
          'tiktok_01': {
            network: 'tiktok',
            tipo_dado: 'real',
            seguidores: 180000,
            formatos: ['Videos']
          },
          'yt_01': {
            network: 'youtube',
            tipo_dado: 'real',
            seguidores: 95000,
            formatos: ['Videos']
          }
        },
        publicoPresencial: {
          tipo_dado: 'real',
          historico: '35.000 participantes em 2024',
          perfil_socioeconomico: 'Classes A/B',
          genero: { f: 45, m: 55 }
        },
        facts: [
          { label: 'Formato', value: 'Festival esportivo de 3 dias' },
          { label: 'Transmissao prevista', value: 'TV Aberta (Globo) e Streaming (YouTube)' },
          { label: 'Publico esperado', value: '40.000 pessoas' }
        ]
      }
    },
    {
      name: 'So Canais Digitais',
      desc: 'Influenciador de moda — apenas Instagram e TikTok, sem evento presencial',
      data: {
        category: 'Moda',
        publicoCanais: {
          'insta_02': {
            network: 'instagram',
            tipo_dado: 'real',
            seguidores: 520000,
            formatos: ['Reels', 'Stories'],
            cidade: 'Rio de Janeiro'
          },
          'tiktok_02': {
            network: 'tiktok',
            tipo_dado: 'estimativa',
            seguidores: 310000,
            formatos: ['Videos']
          }
        },
        publicoPresencial: null,
        facts: []
      }
    },
    {
      name: 'Dados Minimos',
      desc: 'Evento local com apenas publico presencial estimado — sem canais digitais',
      data: {
        category: 'Cultura',
        publicoCanais: null,
        publicoPresencial: {
          tipo_dado: 'estimativa',
          historico: '5.000 visitantes em 2023'
        },
        facts: [
          { label: 'Formato', value: 'Exposicao de arte contemporanea' }
        ]
      }
    }
  ];

  // ── ÍCONES por eixo / rede ─────────────────────────────────────
  var ICONS = {
    instagram: '📸',
    tiktok: '🎵',
    youtube: '▶️',
    linkedin: '💼',
    twitch: '🎮',
    facebook: '📘',
    twitter: '🐦',
    presencial: '🏟️',
    broadcast: '📺'
  };

  function getIcon(item) {
    if (item.axis === 'presencial') return ICONS.presencial;
    if (item.axis === 'broadcast') return ICONS.broadcast;
    return ICONS[item.network] || '📊';
  }

  // ── CONFIDENCE labels ──────────────────────────────────────────
  var CONF_LABELS = {
    alta: 'Confianca alta',
    media: 'Confianca media',
    estimativa: 'Estimativa'
  };

  // ── RENDER WIDGET ──────────────────────────────────────────────
  function renderWidget(result) {
    if (!result || result.total <= 0) {
      return '<div class="emv-empty">Dados insuficientes para calcular EMV</div>';
    }

    var html = '<div class="emv-widget">';
    html += '<div class="emv-label">Valor Estimado de Midia</div>';
    html += '<div class="emv-total">' + EMVCalc.formatBRL(result.total) + '</div>';

    // Confidence badge
    html += '<div class="emv-confidence confidence-' + result.confidence + '">';
    html += '<span class="dot"></span> ' + CONF_LABELS[result.confidence];
    html += '</div>';

    // Breakdown
    html += '<div class="emv-breakdown">';

    for (var i = 0; i < result.breakdown.length; i++) {
      var item = result.breakdown[i];
      var label = '';

      if (item.axis === 'digital') {
        label = item.network.charAt(0).toUpperCase() + item.network.slice(1);
        label += ' (' + (item.seguidores / 1000).toFixed(0) + 'K seg.)';
      } else if (item.axis === 'presencial') {
        label = 'Presencial (' + item.publico.toLocaleString('pt-BR') + ' pessoas)';
      } else if (item.axis === 'broadcast') {
        label = item.tipo || 'Broadcast';
      }

      html += '<div class="emv-row">';
      html += '<span class="emv-row-label"><span class="emv-row-icon">' + getIcon(item) + '</span> ' + label + '</span>';
      html += '<span class="emv-row-value">' + EMVCalc.formatBRL(item.value) + '</span>';
      html += '</div>';
    }

    html += '</div>'; // breakdown

    html += '<div class="emv-disclaimer">Valores estimados com base em CPMs de referencia do mercado brasileiro. Resultados reais podem variar conforme engajamento, sazonalidade e negociacao.</div>';
    html += '</div>'; // widget

    return html;
  }

  // ── RENDER SCENARIOS ───────────────────────────────────────────
  function renderScenarios() {
    var container = document.getElementById('scenarios');
    var html = '';

    for (var s = 0; s < SCENARIOS.length; s++) {
      var sc = SCENARIOS[s];
      var result = EMVCalc.calculate(sc.data);

      html += '<div class="scenario-card">';
      html += '<div class="scenario-header">';
      html += '<h2>' + sc.name + '</h2>';
      html += '<p>' + sc.desc + '</p>';
      html += '</div>';
      html += '<div class="scenario-body">';

      // Widget
      html += renderWidget(result);

      // Debug toggle
      html += '<div class="debug-toggle" onclick="toggleDebug(this)">▸ Ver dados brutos</div>';
      html += '<div class="debug-panel">';
      html += 'INPUT:\n' + JSON.stringify(sc.data, null, 2);
      html += '\n\nOUTPUT:\n' + JSON.stringify(result, null, 2);
      html += '</div>';

      html += '</div>'; // scenario-body
      html += '</div>'; // scenario-card
    }

    container.innerHTML = html;
  }

  // ── TOGGLE DEBUG ───────────────────────────────────────────────
  window.toggleDebug = function (el) {
    var panel = el.nextElementSibling;
    var isOpen = panel.classList.contains('open');
    panel.classList.toggle('open');
    el.textContent = isOpen ? '▸ Ver dados brutos' : '▾ Ocultar dados brutos';
  };

  // ── CUSTOM TEST ────────────────────────────────────────────────
  window.runCustom = function () {
    var cat = document.getElementById('customCat').value;
    var presencial = document.getElementById('customPresencial').value;
    var insta = parseInt(document.getElementById('customInsta').value) || 0;
    var instaFormats = document.getElementById('customInstaFormats').value;
    var tiktok = parseInt(document.getElementById('customTiktok').value) || 0;
    var youtube = parseInt(document.getElementById('customYoutube').value) || 0;
    var broadcast = document.getElementById('customBroadcast').value;
    var publicoEsperado = document.getElementById('customPublicoEsperado').value;

    // Montar publicoCanais
    var canais = {};
    if (insta > 0) {
      var formats = instaFormats
        ? instaFormats.split(',').map(function (f) { return f.trim(); })
        : ['Reels', 'Stories'];
      canais['custom_insta'] = {
        network: 'instagram',
        tipo_dado: 'estimativa',
        seguidores: insta,
        formatos: formats
      };
    }
    if (tiktok > 0) {
      canais['custom_tiktok'] = {
        network: 'tiktok',
        tipo_dado: 'estimativa',
        seguidores: tiktok,
        formatos: ['Videos']
      };
    }
    if (youtube > 0) {
      canais['custom_yt'] = {
        network: 'youtube',
        tipo_dado: 'estimativa',
        seguidores: youtube,
        formatos: ['Videos']
      };
    }

    var presencialObj = null;
    if (presencial) {
      presencialObj = {
        tipo_dado: 'estimativa',
        historico: presencial
      };
    }

    var facts = [];
    if (broadcast) {
      facts.push({ label: 'Transmissao prevista', value: broadcast });
    }
    if (publicoEsperado) {
      facts.push({ label: 'Publico esperado', value: publicoEsperado });
    }

    var data = {
      category: cat,
      publicoCanais: Object.keys(canais).length > 0 ? canais : null,
      publicoPresencial: presencialObj,
      facts: facts.length > 0 ? facts : []
    };

    var result = EMVCalc.calculate(data);

    var html = '<h3 style="font-family:Playfair Display,serif;color:var(--gold);margin-bottom:12px">Resultado</h3>';
    html += renderWidget(result);
    html += '<div class="debug-toggle" onclick="toggleDebug(this)">▸ Ver dados brutos</div>';
    html += '<div class="debug-panel">';
    html += 'INPUT:\n' + JSON.stringify(data, null, 2);
    html += '\n\nOUTPUT:\n' + JSON.stringify(result, null, 2);
    html += '</div>';

    document.getElementById('customResult').innerHTML = html;
  };

  // ── INIT ───────────────────────────────────────────────────────
  renderScenarios();
})();
</script>

</body>
</html>
