<!--
  Radar Relevantia - Logo Animado
  Cola esse código num componente "Embed" ou "Custom Code" no Framer.
  Ou usa direto como <iframe> em qualquer site.
-->
<style>
  @keyframes sweep {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @keyframes dot1 {
    0%, 100% { opacity: 0.06; }
    28%, 48% { opacity: 1; }
  }
  @keyframes dot2 {
    0%, 100% { opacity: 0.06; }
    48%, 66% { opacity: 1; }
  }
  @keyframes dot3 {
    0%, 100% { opacity: 0.06; }
    66%, 80% { opacity: 1; }
  }
  .radar-wrapper {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: transparent;
  }
  .radar-sweep {
    transform-origin: 140px 140px;
    animation: sweep 5s linear infinite;
  }
  .radar-dot1 { animation: dot1 5s linear infinite; }
  .radar-dot2 { animation: dot2 5s linear infinite; }
  .radar-dot3 { animation: dot3 5s linear infinite; }
</style>

      <clipPath id="dc"><circle cx="140" cy="140" r="118"/></clipPath>
